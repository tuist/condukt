name: Condukt

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compile:
    name: Compile without warnings
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      # Compile native modules as plain stubs in the broad Elixir jobs.
      # The tagged NIF tests are excluded from the default suite, and
      # loading these shared libraries on Linux runners can segfault BEAM
      # during process teardown even when the tagged tests do not run.
      # Native coverage lives in dedicated jobs below.
      CONDUKT_BASHKIT_DISABLE: "1"
      CONDUKT_MICROSANDBOX_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Upload Mix dependencies
        uses: actions/upload-artifact@v4
        with:
          name: mix-test-build
          path: |
            deps
            _build/test
          if-no-files-found: error

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
      CONDUKT_MICROSANDBOX_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run test suite
        run: mix test

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
      CONDUKT_MICROSANDBOX_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  credo:
    name: Run Credo
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
      CONDUKT_MICROSANDBOX_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --strict

  k8s_sandbox:
    name: K8s sandbox smoke tests (kind)
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
      CONDUKT_MICROSANDBOX_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: condukt-smoke
          wait: 60s

      - name: Wait for kind control plane
        run: |
          kubectl wait --for=condition=Ready node --all --timeout=120s
          kubectl -n kube-system rollout status deployment/coredns --timeout=120s

      - name: Pre-pull pod image into the kind cluster
        run: |
          docker pull debian:bookworm-slim
          kind load docker-image debian:bookworm-slim --name condukt-smoke

      - name: Run K8s sandbox smoke tests
        run: mix test --only k8s_sandbox test/condukt/sandbox/kubernetes_test.exs
