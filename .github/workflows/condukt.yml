name: Condukt

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compile:
    name: Compile without warnings
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      # Compile native modules as plain stubs in the broad Elixir jobs.
      # The tagged NIF tests are excluded from the default suite, and
      # loading these shared libraries on Linux runners can segfault BEAM
      # during process teardown even when the tagged tests do not run.
      # Native coverage lives in dedicated jobs below.
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Upload Mix dependencies
        uses: actions/upload-artifact@v4
        with:
          name: mix-test-build
          path: |
            deps
            _build/test
          if-no-files-found: error

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run test suite
        run: mix test

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  credo:
    name: Run Credo
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --strict

  k8s_sandbox:
    name: K8s sandbox smoke tests (kind)
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: condukt-smoke
          wait: 60s

      - name: Wait for kind control plane
        run: |
          kubectl wait --for=condition=Ready node --all --timeout=120s
          kubectl -n kube-system rollout status deployment/coredns --timeout=120s

      - name: Pre-pull pod image into the kind cluster
        run: |
          docker pull debian:bookworm-slim
          kind load docker-image debian:bookworm-slim --name condukt-smoke

      - name: Run K8s sandbox smoke tests
        run: mix test --only k8s_sandbox test/condukt/sandbox/kubernetes_test.exs

  egress_rust:
    name: condukt-egress Rust (test + clippy + fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: native/condukt_egress

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/condukt_egress/target
          key: condukt-egress-cargo-${{ hashFiles('native/condukt_egress/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --release

  egress_image_build:
    name: condukt-egress image (build)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64
        uses: docker/build-push-action@v6
        with:
          context: native/condukt_egress
          file: native/condukt_egress/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=condukt-egress
          cache-to: type=gha,scope=condukt-egress,mode=max
