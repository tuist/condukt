name: Condukt

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compile:
    name: Compile without warnings
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      # Compile native modules as plain stubs in the broad Elixir jobs.
      # The tagged NIF tests are excluded from the default suite, and
      # loading these shared libraries on Linux runners can segfault BEAM
      # during process teardown even when the tagged tests do not run.
      # Native coverage lives in dedicated jobs below.
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Upload Mix dependencies
        uses: actions/upload-artifact@v4
        with:
          name: mix-test-build
          path: |
            deps
            _build/test
          if-no-files-found: error

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
      # Temporary: keep symbols on the rebuilt NIF so gdb backtraces from the
      # teardown segfault have function names. Revert when the root cause is
      # identified and fixed.
      CARGO_PROFILE_RELEASE_STRIP: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "line-tables-only"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev gdb

      - name: Enable core dumps
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sh -c 'echo "/tmp/cores/core.%e.%p" > /proc/sys/kernel/core_pattern'
          echo "core_pattern: $(cat /proc/sys/kernel/core_pattern)"

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run test suite
        run: |
          ulimit -c unlimited
          set +e
          mix test
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::Core dumps"
            ls -la /tmp/cores/ || true
            for core in /tmp/cores/core.*; do
              [ -e "$core" ] || continue
              echo "--- $core ---"
              file_out=$(file "$core")
              echo "$file_out"
              exe=$(printf '%s' "$file_out" | sed -n "s/.*execfn: '\\([^']*\\)'.*/\\1/p")
              if [ -z "$exe" ]; then
                exe=$(ls /home/runner/.local/share/mise/installs/erlang/*/erts-*/bin/beam.smp 2>/dev/null | head -1)
              fi
              echo "executable: $exe"
              gdb -batch \
                -ex 'set pagination off' \
                -ex 'info sharedlibrary' \
                -ex 'thread apply all bt full' \
                -ex quit \
                "$exe" "$core" 2>&1 || true
            done
            echo "::endgroup::"
          fi
          exit $status

      - name: Upload core dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-core-dumps
          path: /tmp/cores/
          if-no-files-found: ignore
          retention-days: 7

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  credo:
    name: Run Credo
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --strict

  k8s_sandbox:
    name: K8s sandbox smoke tests (kind)
    runs-on: ubuntu-latest
    needs: compile
    env:
      MIX_ENV: test
      CONDUKT_BASHKIT_DISABLE: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install BEAM tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev

      - name: Download Mix dependencies
        uses: actions/download-artifact@v4
        with:
          name: mix-test-build
          path: .

      - name: Fetch dependencies
        run: mix deps.get

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: condukt-smoke
          wait: 60s

      - name: Wait for kind control plane
        run: |
          kubectl wait --for=condition=Ready node --all --timeout=120s
          kubectl -n kube-system rollout status deployment/coredns --timeout=120s

      - name: Pre-pull pod image into the kind cluster
        run: |
          docker pull debian:bookworm-slim
          kind load docker-image debian:bookworm-slim --name condukt-smoke

      - name: Run K8s sandbox smoke tests
        run: mix test --only k8s_sandbox test/condukt/sandbox/kubernetes_test.exs
