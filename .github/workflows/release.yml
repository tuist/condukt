name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # plan
  # Decides whether a release should happen, computes the next version, and
  # emits release notes / changelog for the downstream jobs to consume.
  # ============================================================================
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[Release]')
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      current_version: ${{ steps.plan.outputs.current_version }}
      next_version: ${{ steps.plan.outputs.next_version }}
      bump_type: ${{ steps.plan.outputs.bump_type }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Plan release
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          current_version=$(elixir scripts/version.exs current)
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [ -n "$latest_tag" ]; then
            git cliff --context --unreleased > release-context.json
          else
            git cliff --context > release-context.json
          fi

          releaseable_count=$(jq 'if length == 0 then 0 else .[0].commits | length end' release-context.json)

          if [ "$releaseable_count" -eq 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if jq -e '.[0].commits[] | select(.message | test("BREAKING CHANGE|!:"))' release-context.json > /dev/null; then
            bump_type=major
          elif jq -e '.[0].commits[] | select(.group == "Features")' release-context.json > /dev/null; then
            bump_type=minor
          else
            bump_type=patch
          fi

          if [ -n "$latest_tag" ]; then
            next_version=$(elixir scripts/version.exs bump "$latest_tag" "$bump_type")
            git cliff --tag "$next_version" -o CHANGELOG.next.md
            git cliff --config cliff-release.toml --tag "$next_version" --unreleased --strip all -o RELEASE_NOTES.md
          else
            next_version="$current_version"
            git cliff --tag "$next_version" -o CHANGELOG.next.md
            git cliff --config cliff-release.toml --tag "$next_version" --strip all -o RELEASE_NOTES.md
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        if: steps.plan.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-context
          path: |
            CHANGELOG.next.md
            RELEASE_NOTES.md
          retention-days: 1

  # ============================================================================
  # build_nifs
  # Builds each NIF for every supported target/NIF-version pair.
  # Each artifact is uploaded so the publish job can attach it to the
  # GitHub release and feed it into the rustler_precompiled checksum files.
  # ============================================================================
  build_nifs:
    name: Build NIF (${{ matrix.crate }} | ${{ matrix.target }} | nif ${{ matrix.nif }})
    needs: plan
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - { crate: condukt_bashkit, nif: "2.16", target: aarch64-apple-darwin, os: macos-14 }
          - { crate: condukt_bashkit, nif: "2.16", target: x86_64-apple-darwin, os: macos-15-intel }
          - { crate: condukt_bashkit, nif: "2.16", target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { crate: condukt_bashkit, nif: "2.16", target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { crate: condukt_bashkit, nif: "2.16", target: x86_64-pc-windows-msvc, os: windows-2022 }
          - { crate: condukt_bashkit, nif: "2.17", target: aarch64-apple-darwin, os: macos-14 }
          - { crate: condukt_bashkit, nif: "2.17", target: x86_64-apple-darwin, os: macos-15-intel }
          - { crate: condukt_bashkit, nif: "2.17", target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { crate: condukt_bashkit, nif: "2.17", target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { crate: condukt_bashkit, nif: "2.17", target: x86_64-pc-windows-msvc, os: windows-2022 }
          - { crate: condukt_microsandbox, nif: "2.16", target: aarch64-apple-darwin, os: macos-14 }
          - { crate: condukt_microsandbox, nif: "2.16", target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { crate: condukt_microsandbox, nif: "2.16", target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { crate: condukt_microsandbox, nif: "2.17", target: aarch64-apple-darwin, os: macos-14 }
          - { crate: condukt_microsandbox, nif: "2.17", target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { crate: condukt_microsandbox, nif: "2.17", target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          # musl targets are deferred: bashkit (or one of its transitive
          # deps) refuses to produce a `cdylib` under cross-built musl
          # ("does not support these crate types"). Re-add them once the
          # right RUSTFLAGS / cross.toml is in place.

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Linux native dependencies
        if: matrix.crate == 'condukt_microsandbox' && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev

      - name: Build NIF
        id: build-nif
        # v1.1.5 upgrades the bundled `giantswarm/install-binary-action` from
        # v2 to v4, which fixes a tar incompatibility on macOS. v1.1.4's
        # `if: ${{ inputs.use-cross && ... }}` check on the cross install
        # step also runs when use-cross is the string `"false"` (a known
        # GH Actions composite-input gotcha), which is why the macOS jobs
        # were trying to install cross at all.
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: ${{ matrix.crate }}
          project-version: ${{ needs.plan.outputs.next_version }}
          target: ${{ matrix.target }}
          nif-version: ${{ matrix.nif }}
          # Pass empty string (not "false") for non-cross targets so the
          # action's `if: ${{ inputs.use-cross && ... }}` condition skips
          # the cross install step. Composite-action boolean inputs are
          # passed as strings, and any non-empty string is truthy in GH
          # expressions, so "false" would still trigger the install.
          use-cross: ${{ matrix.use-cross == true && 'true' || '' }}
          project-dir: native/${{ matrix.crate }}

      - name: Upload NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-nif.outputs.file-name }}
          path: ${{ steps.build-nif.outputs.file-path }}
          if-no-files-found: error

  # ============================================================================
  # publish
  # Bundles the NIF artifacts, computes the checksum file, publishes the
  # source-only hex package (which now includes the checksum file), tags
  # the release commit, and creates the GitHub release with all NIF
  # artifacts attached so consumers can download them via their version URL.
  # ============================================================================
  publish:
    name: Publish to Hex.pm and create GitHub release
    needs: [plan, build_nifs]
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_commit: ${{ steps.publish.outputs.release_commit }}
    # Publish under the non-dev Mix environment so Hex package validation and
    # publishing exercise the precompiled NIF path, not the dev source build.
    env:
      MIX_ENV: prod

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Assert release Mix environment
        run: |
          elixir -e 'Mix.start(); unless Mix.env() == :prod, do: raise("release publishing must run with MIX_ENV=prod")'

      - name: Fetch dependencies
        run: mix deps.get

      - name: Download release context
        uses: actions/download-artifact@v4
        with:
          name: release-context
          path: .

      - name: Download bashkit NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: nif-artifacts/condukt_bashkit
          pattern: "*condukt_bashkit-*.tar.gz"
          merge-multiple: true

      - name: Download microsandbox NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: nif-artifacts/condukt_microsandbox
          pattern: "*condukt_microsandbox-*.tar.gz"
          merge-multiple: true

      - name: Generate checksum files
        run: |
          set -euo pipefail
          find nif-artifacts -maxdepth 2 -type f -name '*.tar.gz' -print | sort
          elixir scripts/generate_nif_checksum.exs nif-artifacts/condukt_bashkit Elixir.Condukt.Bashkit.NIF
          elixir scripts/generate_nif_checksum.exs nif-artifacts/condukt_microsandbox Elixir.Condukt.Microsandbox.NIF

      - name: Update version and changelog
        run: |
          elixir scripts/version.exs set "${{ needs.plan.outputs.next_version }}"
          mv CHANGELOG.next.md CHANGELOG.md

      - name: Validate Hex package
        run: |
          build_dir="$(mktemp -d /tmp/condukt-hex-build-XXXXXX)"
          mix hex.build --unpack -o "$build_dir"

      - name: Publish release
        id: publish
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          : "${HEX_API_KEY:?HEX_API_KEY secret is required}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mix.exs CHANGELOG.md \
            "checksum-Elixir.Condukt.Bashkit.NIF.exs" \
            "checksum-Elixir.Condukt.Microsandbox.NIF.exs"
          git commit -m "[Release] Condukt ${{ needs.plan.outputs.next_version }}"
          git tag -a "${{ needs.plan.outputs.next_version }}" -m "${{ needs.plan.outputs.next_version }}"

          mix hex.publish package --yes

          git push origin HEAD:main
          git push origin "${{ needs.plan.outputs.next_version }}"

          echo "release_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish documentation to HexDocs
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: dev
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev
          : "${HEX_API_KEY:?HEX_API_KEY secret is required}"

          mix deps.get
          mix docs
          mix hex.publish docs --yes

      - name: Create GitHub release with NIF artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t nif_files < <(find nif-artifacts -type f -name '*.tar.gz' | sort)

          gh release create "${{ needs.plan.outputs.next_version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ steps.publish.outputs.release_commit }}" \
            --title "${{ needs.plan.outputs.next_version }}" \
            --latest=false \
            --prerelease \
            --notes-file RELEASE_NOTES.md \
            "${nif_files[@]}"

  # ============================================================================
  # build_engines
  # Builds Burrito-wrapped standalone engine binaries. These jobs run after the
  # initial GitHub release exists so rustler_precompiled can download the just
  # published target-specific NIF artifacts and compile the bytecode metadata
  # for the same target the Burrito wrapper is building.
  # ============================================================================
  build_engines:
    name: Build engine (${{ matrix.burrito_target }})
    needs: [plan, publish]
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - burrito_target: linux_x64
            runner: ubuntu-24.04
            asset_suffix: linux-x64-gnu
            binary_name: condukt_linux_x64
            archive_ext: tar.gz
            target_arch: x86_64
            target_vendor: unknown
            target_os: linux
            target_abi: gnu
          - burrito_target: macos_x64
            runner: macos-15-intel
            asset_suffix: macos-x64
            binary_name: condukt_macos_x64
            archive_ext: tar.gz
            target_arch: ""
            target_vendor: ""
            target_os: ""
            target_abi: ""
          - burrito_target: macos_arm64
            runner: macos-15
            asset_suffix: macos-arm64
            binary_name: condukt_macos_arm64
            archive_ext: tar.gz
            target_arch: ""
            target_vendor: ""
            target_os: ""
            target_abi: ""
          - burrito_target: windows_x64
            runner: ubuntu-24.04
            asset_suffix: windows-x64-msvc
            binary_name: condukt_windows_x64.exe
            archive_ext: zip
            target_arch: x86_64
            target_vendor: pc
            target_os: windows
            target_abi: msvc

    steps:
      - name: Check out the release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish.outputs.release_commit }}

      - name: Install tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: true
          install_args: erlang elixir zig

      - name: Install archive tools
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y p7zip-full xz-utils
          else
            brew install p7zip xz
          fi

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch production dependencies
        run: MIX_ENV=prod mix deps.get --only prod

      - name: Build Burrito engine
        env:
          BURRITO_TARGET: ${{ matrix.burrito_target }}
          CONDUKT_BASHKIT_PRECOMPILED: "1"
          TARGET_ARCH_VALUE: ${{ matrix.target_arch }}
          TARGET_VENDOR_VALUE: ${{ matrix.target_vendor }}
          TARGET_OS_VALUE: ${{ matrix.target_os }}
          TARGET_ABI_VALUE: ${{ matrix.target_abi }}
        run: |
          set -euo pipefail

          for target_env in TARGET_ARCH TARGET_VENDOR TARGET_OS TARGET_ABI; do
            unset "$target_env"
          done

          [ -n "$TARGET_ARCH_VALUE" ] && export TARGET_ARCH="$TARGET_ARCH_VALUE"
          [ -n "$TARGET_VENDOR_VALUE" ] && export TARGET_VENDOR="$TARGET_VENDOR_VALUE"
          [ -n "$TARGET_OS_VALUE" ] && export TARGET_OS="$TARGET_OS_VALUE"
          [ -n "$TARGET_ABI_VALUE" ] && export TARGET_ABI="$TARGET_ABI_VALUE"

          MIX_ENV=prod mix release condukt --overwrite

      - name: Package engine asset
        env:
          VERSION: ${{ needs.plan.outputs.next_version }}
          BURRITO_TARGET: ${{ matrix.burrito_target }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          BINARY_NAME: ${{ matrix.binary_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail

          binary="burrito_out/${BINARY_NAME}"
          test -f "$binary"

          asset_base="condukt-${VERSION}-${ASSET_SUFFIX}"
          package_dir="dist/${asset_base}"
          mkdir -p "$package_dir"

          if [ "$ARCHIVE_EXT" = "zip" ]; then
            cp "$binary" "${package_dir}/condukt.exe"
            (cd "$package_dir" && 7z a "../${asset_base}.zip" condukt.exe)
          else
            cp "$binary" "${package_dir}/condukt"
            chmod 755 "${package_dir}/condukt"
            tar -czf "dist/${asset_base}.tar.gz" -C "$package_dir" condukt
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${asset_base}.${ARCHIVE_EXT}" > "${asset_base}.${ARCHIVE_EXT}.sha256")
          else
            (cd dist && shasum -a 256 "${asset_base}.${ARCHIVE_EXT}" > "${asset_base}.${ARCHIVE_EXT}.sha256")
          fi

      - name: Upload engine asset
        uses: actions/upload-artifact@v4
        with:
          name: condukt-engine-${{ matrix.burrito_target }}
          path: |
            dist/condukt-${{ needs.plan.outputs.next_version }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}
            dist/condukt-${{ needs.plan.outputs.next_version }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}.sha256
          retention-days: 1

  # ============================================================================
  # publish_engine_assets
  # Uploads all standalone engine archives to the already-created GitHub release.
  # ============================================================================
  publish_engine_assets:
    name: Publish engine assets
    needs: [plan, publish, build_engines]
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          path: engine-artifacts
          pattern: condukt-engine-*
          merge-multiple: true

      - name: Upload engine assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mapfile -t engine_files < <(find engine-artifacts -maxdepth 1 -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) | sort)

          printf '%s\n' "${engine_files[@]}"

          if [ "${#engine_files[@]}" -ne 8 ]; then
            echo "Expected 8 engine asset files, got ${#engine_files[@]}" >&2
            exit 1
          fi

          gh release upload "${{ needs.plan.outputs.next_version }}" "${engine_files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

          gh release edit "${{ needs.plan.outputs.next_version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --latest \
            --prerelease=false

  # ============================================================================
  # publish_egress_image
  # Builds the `condukt-egress` sidecar image multi-arch (amd64 + arm64) and
  # pushes it to `ghcr.io/tuist/condukt-egress:<next_version>` plus `:latest`.
  # ============================================================================
  publish_egress_image:
    name: Publish condukt-egress image
    needs: [plan, publish]
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: native/condukt_egress
          file: native/condukt_egress/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/tuist/condukt-egress:${{ needs.plan.outputs.next_version }}
            ghcr.io/tuist/condukt-egress:latest
          labels: |
            org.opencontainers.image.source=https://github.com/tuist/condukt
            org.opencontainers.image.version=${{ needs.plan.outputs.next_version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=condukt-egress
          cache-to: type=gha,scope=condukt-egress,mode=max
